    const Calculator = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;
    const Users = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const ClipboardCheck = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>;
    const MessageCircle = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
    const HelpCircle = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
    const ArrowDown = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>;

    const fullBrandName = "暖暖有限公司附設彰化縣私立暖暖居家長照機構";

    const OfficialWebsite = () => {
      const [currentPage, setCurrentPage] = useState('home');
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      const [activeFAQ, setActiveFAQ] = useState(null);

      // 試算器狀態
      const [level, setLevel] = useState('2');
      const [identity, setIdentity] = useState('16');
      const [quantities, setQuantities] = useState({});

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const levelData = {
        '2': { subsidy: 10020, co16: 1603, co5: 501 },
        '3': { subsidy: 15460, co16: 2474, co5: 773 },
        '4': { subsidy: 18580, co16: 2973, co5: 929 },
        '5': { subsidy: 24100, co16: 3856, co5: 1205 },
        '6': { subsidy: 28070, co16: 4491, co5: 1404 },
        '7': { subsidy: 32090, co16: 5134, co5: 1605 },
        '8': { subsidy: 36180, co16: 5789, co5: 1809 },
      };

      const serviceItems = [
        { code: 'BA01', name: '基本身體清潔', price: 260 },
        { code: 'BA02', name: '基本日常照顧(30分)', price: 195 },
        { code: 'BA04', name: '協助餵食或灌食', price: 130 },
        { code: 'BA05', name: '餐食照顧', price: 310 },
        { code: 'BA07', name: '協助沐浴及洗頭', price: 325 },
        { code: 'BA14', name: '陪同就醫(1.5hr)', price: 685 },
        { code: 'BA15', name: '家務協助(30分)', price: 195 },
        { code: 'GA09', name: '居家喘息(2hr)', price: 770 },
        { code: 'SC09', name: '短照服務(2hr)', price: 770 },
      ];

      const faqs = [
        { q: "要怎麼開始申請居家服務？", a: "您可以先撥打長照專線 1966，由照管中心評估失能等級後，指定由「暖暖居家」為您服務；或直接聯繫我們，我們將協助您完成後續流程。" },
        { q: "居服員可以幫忙全家大掃除嗎？", a: "居家服務主要以「長輩本人的生活起居」為主。為了保障專業品質，無法提供全家大掃除等勞務。" },
        { q: "費用要怎麼計算？", a: "依據失能等級與身份而定，建議使用本站「費用試算」功能獲得預估金額。" },
      ];

      const navigate = (page) => {
        setCurrentPage(page);
        setIsMenuOpen(false);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const calculateCoPay = (price) => {
        if (identity === '0') return 0;
        return Math.round(price * (parseInt(identity) / 100));
      };

      const getFullCalculation = () => {
        const data = levelData[level];
        const subsidyLimit = data.subsidy;
        const rate = parseInt(identity) / 100;
        let currentTotalCost = 0;
        let totalCopay = 0;
        let totalItems = 0;

        Object.keys(quantities).forEach(code => {
          const item = serviceItems.find(i => i.code === code);
          const qty = parseInt(quantities[code]) || 0;
          totalItems += qty;
          for (let i = 0; i < qty; i++) {
            if (currentTotalCost + item.price <= subsidyLimit) {
              totalCopay += Math.round(item.price * (identity === '0' ? 0 : rate));
            } else {
              const remainingSubsidy = Math.max(0, subsidyLimit - currentTotalCost);
              const copayForRemaining = Math.round(remainingSubsidy * (identity === '0' ? 0 : rate));
              totalCopay += (copayForRemaining + (item.price - remainingSubsidy));
            }
            currentTotalCost += item.price;
          }
        });
        return { totalCopay, currentTotalCost, subsidyLimit, totalItems };
      };

      const calcResults = getFullCalculation();

      const handleQtyChange = (code, val) => {
        const newQty = Math.max(0, parseInt(val) || 0);
        setQuantities({ ...quantities, [code]: newQty });
      };

      const Navbar = () => (
        <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-md py-3' : 'bg-transparent py-6'}`}>
          <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => navigate('home')}>

              </div>
              <div className="flex flex-col max-w-[200px] md:max-w-none">
                <span className={`font-black text-xs md:text-sm tracking-tighter leading-tight ${scrolled ? 'text-gray-900' : 'text-white md:text-gray-900'}`}>{fullBrandName}</span>
                <span className={`text-[8px] font-bold ${scrolled ? 'text-orange-500' : 'text-white/80 md:text-orange-500'}`}>府授衛長字第1150109649號</span>
              </div>
            </div>

            <div className={`hidden lg:flex gap-8 items-center font-bold text-sm ${scrolled ? 'text-gray-600' : 'text-white md:text-gray-600'}`}>
              <button onClick={() => navigate('home')} className="hover:text-orange-500 transition">首頁</button>
              <button onClick={() => navigate('about')} className="hover:text-orange-500 transition">關於暖暖</button>
              <button onClick={() => navigate('services')} className="hover:text-orange-500 transition">服務流程</button>
              <button onClick={() => navigate('calc')} className="hover:text-orange-500 transition">費用試算</button>
              <a href="tel:0901071711" className="bg-orange-500 text-white px-5 py-2 rounded-full hover:bg-orange-600 transition shadow-lg flex items-center gap-2">
                <Phone size={14}/> 聯繫督導
              </a>
            </div>

            <button className={`lg:hidden ${scrolled ? 'text-gray-900' : 'text-white'}`} onClick={() => setIsMenuOpen(!isMenuOpen)}>
              {isMenuOpen ? <X size={28} /> : <Menu size={28} />}
            </button>
          </div>

          {isMenuOpen && (
            <div className="lg:hidden fixed inset-0 top-[72px] bg-white z-40 p-6 flex flex-col gap-6 text-xl font-black text-gray-800 h-screen overflow-y-auto pb-32">
              <button onClick={() => navigate('home')} className="text-left border-b pb-4 border-gray-100">首頁</button>
              <button onClick={() => navigate('about')} className="text-left border-b pb-4 border-gray-100">關於暖暖</button>
              <button onClick={() => navigate('services')} className="text-left border-b pb-4 border-gray-100">服務流程</button>
              <button onClick={() => navigate('calc')} className="text-left border-b pb-4 border-gray-100">費用試算</button>
              <div className="mt-8 space-y-4">
                 <a href="tel:0901071711" className="flex items-center justify-center gap-2 bg-gray-900 text-white p-4 rounded-2xl text-center shadow-xl">
                    <Phone size={20}/> 撥打電話
                 </a>
                 <a href="https://line.me/ti/p/~" className="flex items-center justify-center gap-2 bg-green-500 text-white p-4 rounded-2xl text-center shadow-xl">

      );

      const Footer = () => (
        <footer className="bg-stone-900 text-white py-20 px-6">

            <div className="col-span-2">
              <div className="flex items-center gap-3 mb-6">

              </p>
              <div className="inline-block bg-stone-800 text-stone-300 px-4 py-2 rounded-lg text-xs font-mono border border-stone-700">
                立案字號：府授衛長字第1150109649號
              </div>
            </div>
            <div>
              <h4 className="font-bold mb-6 text-orange-500">快速導覽</h4>
              <ul className="space-y-4 text-stone-400 text-sm font-medium">
                <li className="cursor-pointer hover:text-white" onClick={() => navigate('about')}>團隊理念</li>
                <li className="cursor-pointer hover:text-white" onClick={() => navigate('services')}>申請流程</li>
                <li className="cursor-pointer hover:text-white" onClick={() => navigate('calc')}>長照試算</li>
              </ul>
            </div>
            <div>
              <h4 className="font-bold mb-6 text-orange-500">服務據點</h4>
              <ul className="space-y-4 text-stone-400 text-sm font-medium">
                <li className="flex items-center gap-3"><Phone size={14} className="text-orange-500"/> 0901-071-711</li>
                <li className="flex items-start gap-3"><MapPin size={14} className="text-orange-500 shrink-0 mt-1"/> 彰化縣大城鄉西勢路30號</li>
              </ul>
            </div>
          </div>
          <div className="max-w-7xl mx-auto mt-20 pt-10 border-t border-white/5 text-[10px] text-stone-600 flex flex-col md:flex-row justify-between items-center gap-4 tracking-widest font-bold">
            <span>© 2026 {fullBrandName}</span>
            <span>MADE IN CHANGHUA</span>

        </footer>
      );

      const HomePage = () => (
        <div className="animate-in fade-in duration-700">
          <section className="relative h-[90vh] flex items-center px-6 overflow-hidden bg-gray-900">
            <div className="absolute inset-0 bg-gradient-to-r from-black/80 via-black/50 to-transparent z-10"></div>
            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1576765608535-5f04d1e3f289?auto=format&fit=crop&q=80')] bg-cover bg-center"></div>
            <div className="max-w-7xl mx-auto w-full relative z-20 pt-10">
              <div className="max-w-3xl">
                <span className="bg-orange-500/20 text-orange-400 border border-orange-500/30 backdrop-blur-sm px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest uppercase mb-6 inline-block">
                  彰化大城專業照護首選
                </span>
                <h1 className="text-4xl md:text-6xl lg:text-7xl font-black text-white mb-8 leading-tight">{fullBrandName}</h1>
                <p className="text-stone-300 text-lg md:text-xl mb-12 font-medium leading-relaxed max-w-2xl">
                  守護在地長輩，減輕家庭負擔。由國家社工師親自帶領，為大城鄉親提供最暖心的居家照護服務。
                </p>
                <div className="flex flex-wrap gap-4">
                  <button onClick={() => navigate('calc')} className="bg-orange-500 text-white px-8 py-4 rounded-full font-black text-sm hover:bg-orange-600 transition shadow-2xl flex items-center gap-2">
                    <Calculator size={18}/> 費用試算系統
                  </button>
                  <a href="tel:0901071711" className="bg-white text-gray-900 px-8 py-4 rounded-full font-black text-sm hover:bg-gray-100 transition flex items-center gap-2">
                    <Phone size={18}/> 諮詢督導員
                  </a>
                </div>
              </div>
            </div>
          </section>
        </div>
      );

      const CalcPage = () => (
        <div className="pt-32 pb-24 px-6 bg-white min-h-screen">
          <div className="max-w-6xl mx-auto">
            <div className="text-center mb-16">
              <div className="bg-orange-500 w-16 h-16 rounded-2xl flex items-center justify-center text-white mx-auto mb-6 shadow-xl shadow-orange-200">
                <Calculator size={32}/>
              </div>
              <h2 className="text-3xl md:text-4xl font-black mb-4 tracking-tighter uppercase">長照 3.0 費用試算系統</h2>
              <p className="text-stone-400 font-bold text-sm leading-relaxed">請選擇等級與輸入服務次數，系統將自動套用政府給付標準。</p>
            </div>

            <div className="grid lg:grid-cols-5 gap-10 bg-stone-50 p-4 md:p-10 rounded-[40px] border border-stone-200">
              <div className="lg:col-span-3 space-y-8">
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
                  <h4 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                    <div className="w-1.5 h-1.5 bg-orange-500 rounded-full"></div> 1. 設定補助資格
                  </h4>
                  <div className="space-y-8">
                    <div>
                      <p className="text-xs font-bold text-gray-500 mb-3 italic">失能等級 (CMS等級越高 額度越高)</p>
                      <div className="grid grid-cols-4 gap-2">
                        {Object.keys(levelData).map(l => (
                          <button key={l} onClick={() => setLevel(l)} className={`py-3 rounded-2xl font-black text-sm transition-all ${level === l ? 'bg-orange-500 text-white shadow-lg' : 'bg-stone-100 text-stone-500 hover:bg-orange-50'}`}>{l}級</button>
                        ))}
                      </div>
                    </div>
                    <div>
                      <p className="text-xs font-bold text-gray-500 mb-3 italic">福利身份 (決定自付比例)</p>
                      <div className="grid grid-cols-3 gap-2">
                        {['16', '5', '0'].map(id => (
                          <button key={id} onClick={() => setIdentity(id)} className={`py-3 rounded-2xl font-black text-[10px] transition-all border-2 ${identity === id ? 'border-orange-500 bg-orange-50 text-orange-700' : 'border-stone-100 text-stone-400'}`}>
                            {id === '16' ? '一般戶 (16%)' : id === '5' ? '中低收 (5%)' : '低收入 (0%)'}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
                  <h4 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                    <div className="w-1.5 h-1.5 bg-orange-500 rounded-full"></div> 2. 規劃服務內容 (每月次數)
                  </h4>
                  <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                    {serviceItems.map(item => (
                      <div key={item.code} className={`flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-2xl transition-all ${quantities[item.code] > 0 ? 'bg-orange-50 border border-orange-200' : 'bg-stone-50'}`}>
                        <div className="mb-3 sm:mb-0">
                          <p className="text-sm font-black text-gray-800 leading-none mb-1.5">{item.name}</p>
                          <p className="text-[10px] font-bold text-gray-400 tracking-wider">
                            定價 ${item.price} / 自付 ${calculateCoPay(item.price)}
                          </p>
                        </div>
                        <div className="flex items-center gap-2 bg-white rounded-xl p-1 border border-stone-200 shadow-sm w-fit">
                          <button 
                            onClick={() => handleQtyChange(item.code, (quantities[item.code] || 0) - 1)} 
                            className="w-10 h-10 flex items-center justify-center rounded-lg bg-stone-100 text-stone-500 font-bold hover:bg-stone-200 transition"
                          >-</button>
                          <input 
                            type="number" 
                            className="w-12 text-center text-sm font-black text-orange-600 outline-none"
                            value={quantities[item.code] || 0}
                            onChange={(e) => handleQtyChange(item.code, e.target.value)}
                          />
                          <button 
                            onClick={() => handleQtyChange(item.code, (quantities[item.code] || 0) + 1)} 
                            className="w-10 h-10 flex items-center justify-center rounded-lg bg-orange-500 text-white font-bold hover:bg-orange-600 transition"
                          >+</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="lg:col-span-2">
                <div className="sticky top-32 space-y-6">
                  <div className="bg-gray-900 rounded-[32px] p-8 text-white shadow-2xl relative overflow-hidden">
                    <p className="text-xs font-bold text-orange-400 mb-2 uppercase tracking-widest flex justify-between">預估每月自付總額 <span className="text-white/30 text-[10px]">CMS 第 {level} 級</span></p>
                    <h3 className="text-5xl font-black mb-8">${calcResults.totalCopay.toLocaleString()}</h3>
                    
                    <div className="space-y-4 border-t border-white/10 pt-6">
                      <div className="flex justify-between text-[10px] font-bold">
                        <span className="text-white/40">消耗額度明細</span>
                        <span className={`${calcResults.currentTotalCost > calcResults.subsidyLimit ? 'text-red-400' : 'text-stone-400'}`}>
                          ${calcResults.currentTotalCost.toLocaleString()} / ${calcResults.subsidyLimit.toLocaleString()}
                        </span>
                      </div>
                      {calcResults.currentTotalCost > calcResults.subsidyLimit && (
                        <div className="bg-red-500/10 text-red-400 p-4 rounded-xl text-[10px] leading-relaxed border border-red-500/20 font-bold">
                          ⚠ 您選擇的項目已超出政府補助範圍，超出部分將以「全自費」計算。
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="bg-white p-8 rounded-[32px] border border-stone-200 text-center shadow-sm">
                     <p className="text-[10px] font-bold text-stone-400 mb-6 leading-relaxed">※ 最終正確金額請以督導員開立之照顧計畫為準。</p>
                     <div className="space-y-3">
                       <a href="tel:0901071711" className="flex items-center justify-center gap-2 w-full bg-orange-500 text-white py-4 rounded-xl font-black shadow-lg">
                         <Phone size={18}/> 立即預約評估
                       </a>
                       <a href="https://line.me/ti/p/~" className="flex items-center justify-center gap-2 w-full border-2 border-green-500 text-green-600 py-3.5 rounded-xl font-black transition hover:bg-green-50">
                         <MessageCircle size={18}/> LINE 線上諮詢
                       </a>
                     </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );

      // 其他分頁 (About, Services) 保持先前邏輯，名稱同步
      const AboutPage = () => (
        <div className="pt-32 pb-24 px-6 bg-white min-h-screen">
          <div className="max-w-4xl mx-auto">
            <h2 className="text-3xl font-black mb-8 border-l-8 border-orange-500 pl-4">{fullBrandName}</h2>
            <div className="prose prose-stone max-w-none text-stone-600 leading-relaxed space-y-6">
              <p>本機構致力於服務彰化縣大城鄉在地長輩，由專業社工師親自經營與帶領，提供誠信、溫暖且專業的照護品質。</p>
              <p>立案字號：府授衛長字第1150109649號</p>
              <p>地址：彰化縣大城鄉西勢路30號</p>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-stone-50">
          <Navbar />
          {currentPage === 'home' && <HomePage />}
          {currentPage === 'about' && <AboutPage />}
          {currentPage === 'calc' && <CalcPage />}
          <Footer />
          <div className="lg:hidden fixed bottom-6 right-4 z-50 flex flex-col gap-3">
            <a href="https://line.me/ti/p/~" className="bg-green-500 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center border-2 border-white">
              <MessageCircle size={24} />
            </a>
            <a href="tel:0901071711" className="bg-orange-500 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center border-2 border-white">
              <Phone size={24} />
            </a>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OfficialWebsite />);
  </script>
</body>
</html>
