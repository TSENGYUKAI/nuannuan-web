<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- SEO 優化標籤 -->
  <title>暖暖有限公司附設彰化縣私立暖暖居家長照機構 - 專業居家服務與試算</title>
  <meta name="description" content="暖暖有限公司附設彰化縣私立暖暖居家長照機構提供彰化縣大城鄉專業居家服務，由專業社工師帶領。立案字號：府授衛長字第1150109649號。">
  
  <!-- 載入核心庫 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; -webkit-tap-highlight-color: transparent; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #ED7D31; border-radius: 10px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    .animate-pulse-fast { animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    
    /* 隱藏數字輸入框的上下箭頭 */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body class="bg-stone-50">
  
  <div id="root">
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;">
      <div style="width: 50px; height: 50px; border-radius: 50%; background-color: #ED7D31; margin-bottom: 20px;" class="animate-pulse-fast"></div>
      <h2 style="color: #ED7D31; font-weight: bold; font-size: 1rem;">暖暖居家載入中...</h2>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    
    // SVG 圖示組件
    const Sun = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
    const Menu = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
    const X = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const Phone = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    const MapPin = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const Calculator = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>;
    const MessageCircle = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
    const Wallet = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>;

    const fullBrandName = "暖暖有限公司附設彰化縣私立暖暖居家長照機構";
    const lineUrl = "https://line.me/ti/p/@957jphho";

    const OfficialWebsite = () => {
      const [currentPage, setCurrentPage] = useState('home');
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      // 試算器狀態
      const [level, setLevel] = useState('2');
      const [identity, setIdentity] = useState('16');
      const [quantities, setQuantities] = useState({});

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // 依照等級區分額度
      const levelData = {
        '2': { subsidy: 10020, respite: 32340, short: 87780 },
        '3': { subsidy: 15460, respite: 32340, short: 87780 },
        '4': { subsidy: 18580, respite: 32340, short: 87780 },
        '5': { subsidy: 24100, respite: 32340, short: 87780 },
        '6': { subsidy: 28070, respite: 32340, short: 87780 },
        '7': { subsidy: 32090, respite: 48510, short: 71610 },
        '8': { subsidy: 36180, respite: 48510, short: 71610 },
      };

      const serviceItems = [
        { code: 'BA01', name: '基本身體清潔', price: 260 },
        { code: 'BA02', name: '基本日常照顧(30分)', price: 195 },
        { code: 'BA03', name: '測量生命徵象', price: 35 },
        { code: 'BA04', name: '協助餵食或灌食', price: 130 },
        { code: 'BA05', name: '餐食照顧', price: 310 },
        { code: 'BA07', name: '協助沐浴及洗頭', price: 325 },
        { code: 'BA08', name: '足部照護', price: 500 },
        { code: 'BA10', name: '翻身拍背', price: 155 },
        { code: 'BA11', name: '肢體關節活動', price: 195 },
        { code: 'BA12', name: '協助上(下)樓梯', price: 130 },
        { code: 'BA13', name: '陪同外出(30分)', price: 195 },
        { code: 'BA14', name: '陪同就醫(1.5hr)', price: 685 },
        { code: 'BA15', name: '家務協助(30分)', price: 195 },
        { code: 'BA16', name: '代購或代領或代送', price: 130 },
        { code: 'BA17a', name: '人工氣道抽吸', price: 75 },
        { code: 'BA17b', name: '口鼻抽吸', price: 65 },
        { code: 'BA17c', name: '管路清潔', price: 50 },
        { code: 'BA17d', name: '甘油球/血糖', price: 50 },
        { code: 'BA17e', name: '依指示置入藥盒', price: 50 },
        { code: 'BA18', name: '安全看視(30分)', price: 200 },
        { code: 'BA20', name: '陪伴服務(30分)', price: 175 },
        { code: 'BA22', name: '巡視服務', price: 130 },
        { code: 'BA23', name: '協助洗頭(額外)', price: 200 },
        { code: 'BA24', name: '協助排泄', price: 220 },
        { code: 'GA09', name: '居家喘息(2hr)', price: 770 },
        { code: 'SC09', name: '短照服務(2hr)', price: 770 },
      ];

      const calculateCoPay = (price) => {
        if (identity === '0') return 0;
        return Math.round(price * (parseInt(identity) / 100));
      };

      const getFullCalculation = () => {
        const data = levelData[level];
        const subsidyLimit = data.subsidy;
        const rate = parseInt(identity) / 100;
        let currentTotalCost = 0;
        let totalCopay = 0;
        let totalItems = 0;

        Object.keys(quantities).forEach(code => {
          const item = serviceItems.find(i => i.code === code);
          const qty = parseInt(quantities[code]) || 0;
          totalItems += qty;
          for (let i = 0; i < qty; i++) {
            if (currentTotalCost + item.price <= subsidyLimit) {
              totalCopay += Math.round(item.price * (identity === '0' ? 0 : rate));
            } else {
              const remainingSubsidy = Math.max(0, subsidyLimit - currentTotalCost);
              const copayForRemaining = Math.round(remainingSubsidy * (identity === '0' ? 0 : rate));
              totalCopay += (copayForRemaining + (item.price - remainingSubsidy));
            }
            currentTotalCost += item.price;
          }
        });
        return { totalCopay, currentTotalCost, subsidyLimit, totalItems };
      };

      const calcResults = getFullCalculation();

      const handleQtyChange = (code, val) => {
        const newQty = val === "" ? 0 : Math.max(0, parseInt(val) || 0);
        setQuantities({ ...quantities, [code]: newQty });
      };

      const navigate = (page) => {
        setCurrentPage(page);
        setIsMenuOpen(false);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      // --- UI Components ---
      const Navbar = () => (
        <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/95 shadow-md py-2' : 'bg-transparent py-4'}`}>
          <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => navigate('home')}>
              <div className="bg-orange-500 p-1.5 rounded-lg text-white shadow-md">
                <Sun size={20} />
              </div>
              <div className="flex flex-col max-w-[220px] md:max-w-none text-left">
                <span className={`font-black text-[10px] md:text-sm tracking-tighter leading-tight ${scrolled ? 'text-gray-900' : 'text-white md:text-gray-900'}`}>{fullBrandName}</span>
                <span className={`text-[8px] font-bold ${scrolled ? 'text-orange-500' : 'text-white/80 md:text-orange-500'}`}>府授衛長字第1150109649號</span>
              </div>
            </div>
            <div className={`hidden lg:flex gap-6 items-center font-bold text-xs ${scrolled ? 'text-gray-600' : 'text-white md:text-gray-600'}`}>
              <button onClick={() => navigate('home')} className="hover:text-orange-500">首頁</button>
              <button onClick={() => navigate('calc')} className="hover:text-orange-500">費用試算</button>
              <a href="tel:0901071711" className="bg-orange-500 text-white px-4 py-2 rounded-full text-[10px] shadow-lg flex items-center gap-2">
                <Phone size={12}/> 聯繫督導
              </a>
            </div>
            <button className={`lg:hidden ${scrolled ? 'text-gray-900' : 'text-white'}`} onClick={() => setIsMenuOpen(!isMenuOpen)}>
              {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
            </button>
          </div>
          {isMenuOpen && (
            <div className="lg:hidden fixed inset-0 top-[60px] bg-white z-40 p-6 flex flex-col gap-6 text-lg font-black text-gray-800">
              <button onClick={() => navigate('home')} className="text-left border-b pb-4">首頁</button>
              <button onClick={() => navigate('calc')} className="text-left border-b pb-4">費用試算</button>
              <a href={lineUrl} target="_blank" className="bg-green-500 text-white p-4 rounded-xl text-center">加入 LINE 諮詢</a>
            </div>
          )}
        </nav>
      );

      const CalcPage = () => (
        <div className="pt-24 pb-24 px-4 bg-stone-100 min-h-screen">
          <div className="max-w-5xl mx-auto">
            
            {/* 試算器標題區 */}
            <div className="bg-white p-6 md:p-10 rounded-[32px] shadow-sm mb-6 text-center border border-stone-200 overflow-hidden relative">
                <h2 className="text-2xl md:text-3xl font-black text-gray-800 tracking-tight">長照 3.0 費用試算系統</h2>
                <p className="text-stone-400 text-xs mt-2 italic font-bold">由專業社工師親自校對，協助家屬精準預估</p>
                <Sun className="absolute -top-10 -right-10 text-orange-50/50" size={150} />
            </div>

            {/* 等級與身份設定區 */}
            <div className="bg-white p-6 md:p-8 rounded-[32px] shadow-sm mb-8 border border-stone-200">
              <div className="grid md:grid-cols-2 gap-10">
                <div>
                  <label className="text-[10px] font-black text-orange-500 uppercase tracking-widest block mb-4 italic">1. 選擇失能等級 (CMS)</label>
                  <div className="grid grid-cols-4 gap-2">
                    {Object.keys(levelData).map(l => (
                      <button key={l} onClick={() => setLevel(l)} className={`py-3 rounded-xl font-black text-sm transition-all ${level === l ? 'bg-orange-500 text-white shadow-lg' : 'bg-stone-100 text-stone-500'}`}>{l}級</button>
                    ))}
                  </div>
                </div>
                <div>
                  <label className="text-[10px] font-black text-orange-500 uppercase tracking-widest block mb-4 italic">2. 您的福利身份</label>
                  <div className="grid grid-cols-3 gap-2">
                    {['16', '5', '0'].map(id => (
                      <button key={id} onClick={() => setIdentity(id)} className={`py-3 rounded-xl font-black text-[11px] transition-all border-2 ${identity === id ? 'border-orange-500 bg-orange-50 text-orange-700' : 'border-transparent bg-stone-100 text-stone-400'}`}>
                        {id === '16' ? '一般戶' : id === '5' ? '中低收' : '低收入'}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            {/* 額度顯示卡片 */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
              <div className="bg-white p-6 rounded-[24px] border border-orange-100 shadow-sm flex flex-col justify-between">
                <p className="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">每月給付額度</p>
                <p className="text-2xl font-black text-gray-800">${levelData[level].subsidy.toLocaleString()}</p>
                <div className="mt-2 h-1 bg-stone-100 rounded-full overflow-hidden">
                  <div className="h-full bg-orange-500" style={{ width: '100%' }}></div>
                </div>
              </div>
              <div className="bg-white p-6 rounded-[24px] border border-orange-100 shadow-sm flex flex-col justify-between">
                <p className="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">喘息服務額度 (GA)</p>
                <p className="text-2xl font-black text-orange-600">${levelData[level].respite.toLocaleString()}<span className="text-xs ml-1 font-bold text-stone-400">/年</span></p>
                <p className="text-[9px] text-stone-400 mt-2">適用於居家/機構/夜間喘息</p>
              </div>
              <div className="bg-white p-6 rounded-[24px] border border-orange-100 shadow-sm flex flex-col justify-between">
                <p className="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">短照服務額度</p>
                <p className="text-2xl font-black text-orange-600">${levelData[level].short.toLocaleString()}<span className="text-xs ml-1 font-bold text-stone-400">/年</span></p>
                <p className="text-[9px] text-stone-400 mt-2">緩解家屬壓力之短期照護</p>
              </div>
            </div>

            <div className="grid lg:grid-cols-3 gap-8">
              {/* 左側：服務清單 (取消分類) */}
              <div className="lg:col-span-2 space-y-4">
                <div className="bg-white rounded-[32px] shadow-sm border border-stone-200 overflow-hidden">
                  <div className="bg-stone-50 px-6 py-4 border-b border-stone-100 flex justify-between items-center">
                    <h3 className="font-black text-gray-700 text-sm">居家服務細項選擇</h3>
                    <span className="text-[10px] font-bold text-stone-400">輸入每月預計使用次數</span>
                  </div>
                  <div className="divide-y divide-stone-50 max-h-[1000px] overflow-y-auto pr-1 custom-scrollbar">
                    {serviceItems.map(item => (
                      <div key={item.code} className={`p-4 md:p-6 flex items-center justify-between hover:bg-stone-50 transition-colors ${quantities[item.code] > 0 ? 'bg-orange-50/30' : ''}`}>
                        <div className="flex-1">
                          <div className="flex items-center gap-2 mb-1">
                            <span className="bg-white border border-stone-200 text-stone-400 text-[9px] font-black px-1.5 py-0.5 rounded">{item.code}</span>
                            <span className="text-sm font-black text-gray-800">{item.name}</span>
                          </div>
                          <div className="text-[10px] text-stone-400 font-medium">
                            定價 ${item.price} | 自付 <span className="text-orange-600 font-bold">${calculateCoPay(item.price)}</span>
                          </div>
                        </div>
                        <div className="flex items-center gap-1.5 bg-white border border-stone-200 rounded-xl p-1 shadow-sm">
                          <button onClick={() => handleQtyChange(item.code, (quantities[item.code] || 0) - 1)} className="w-8 h-8 flex items-center justify-center rounded-lg bg-stone-100 text-stone-500 font-black hover:bg-stone-200">-</button>
                          <input 
                            type="number" 
                            inputMode="numeric"
                            pattern="[0-9]*"
                            onFocus={(e) => e.target.select()}
                            className="w-10 text-center text-xs font-black text-orange-600 outline-none bg-transparent"
                            value={quantities[item.code] || 0}
                            onChange={(e) => handleQtyChange(item.code, e.target.value)}
                          />
                          <button onClick={() => handleQtyChange(item.code, (quantities[item.code] || 0) + 1)} className="w-8 h-8 flex items-center justify-center rounded-lg bg-orange-500 text-white font-black hover:bg-orange-600">+</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* 右側：浮動計算結果 */}
              <div className="lg:col-span-1">
                <div className="sticky top-24 space-y-6">
                  <div className="bg-gray-900 rounded-[40px] p-8 text-white shadow-xl relative overflow-hidden">
                    <p className="text-[10px] font-bold text-orange-400 mb-2 uppercase tracking-widest flex justify-between">預估每月自付總額 <span className="text-white/30 tracking-normal">CMS 第 {level} 級</span></p>
                    <h3 className="text-5xl font-black mb-8 tracking-tighter">${calcResults.totalCopay.toLocaleString()}</h3>
                    
                    <div className="space-y-4 border-t border-white/10 pt-6">
                      <div className="flex justify-between text-[11px] font-bold">
                        <span className="text-white/40 uppercase tracking-widest">已使用額度額</span>
                        <span className={`${calcResults.currentTotalCost > calcResults.subsidyLimit ? 'text-red-400' : 'text-stone-300'}`}>
                          ${calcResults.currentTotalCost.toLocaleString()} / ${calcResults.subsidyLimit.toLocaleString()}
                        </span>
                      </div>
                      {calcResults.currentTotalCost > calcResults.subsidyLimit && (
                        <div className="bg-red-500/20 text-red-300 p-4 rounded-xl text-[10px] leading-relaxed border border-red-500/30 font-bold">
                          ⚠ 您選擇的項目已超出等級上限，超額部分以全自費計算。
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="bg-white p-8 rounded-[32px] border border-stone-200 text-center shadow-sm">
                     <p className="text-[10px] font-bold text-stone-400 mb-6 leading-relaxed italic">※ 正確給付額度與服務項目，請以督導員開立之最終照顧計畫為準。</p>
                     <div className="space-y-3">
                       <a href="tel:0901071711" className="flex items-center justify-center gap-2 w-full bg-orange-500 text-white py-4 rounded-xl font-black text-sm shadow-md hover:bg-orange-600 transition">
                         <Phone size={16}/> 電話諮詢督導
                       </a>
                       <a href={lineUrl} target="_blank" className="flex items-center justify-center gap-2 w-full border-2 border-green-500 text-green-600 py-3.5 rounded-xl font-black text-sm hover:bg-green-50 transition">
                         <MessageCircle size={16}/> 加入 LINE 預約
                       </a>
                     </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );

      const HomePage = () => (
        <div className="animate-in fade-in duration-700">
          <section className="relative h-[85vh] flex items-center px-4 overflow-hidden bg-gray-900">
            <div className="absolute inset-0 bg-gradient-to-r from-black/80 via-black/50 to-transparent z-10"></div>
            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1576765608535-5f04d1e3f289?auto=format&fit=crop&q=80')] bg-cover bg-center"></div>
            <div className="max-w-7xl mx-auto w-full relative z-20 pt-10">
              <div className="max-w-3xl text-left">
                <span className="bg-orange-500/20 text-orange-400 border border-orange-500/30 backdrop-blur-sm px-4 py-1 rounded-full text-[10px] font-black tracking-widest uppercase mb-6 inline-block">彰化大城專業居家照護</span>
