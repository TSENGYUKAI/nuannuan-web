        const dd = String(today.getDate()).padStart(2, '0');
        const dateStr = `${yyyy}.${mm}.${dd}`;

        const newItem = { id: Date.now(), date: dateStr, title: newNewsTitle, desc: newNewsDesc };

        setNewNewsTitle('');

         setNewFaqQ('');
         setNewFaqA('');

               firebaseConfig = JSON.parse(__firebase_config);
            } else {
               console.warn("⚠️ 偵測到外部環境，且未設定 Firebase。系統將切換至單機模式。");
               return; 
            }

            const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, updateDoc, increment, onSnapshot, collection } = window.FirebaseModules;

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            
            setFbAuthInstance(auth);

            signInAnonymously(auth).then(() => {
                unsubscribeAuth = onAuthStateChanged(auth, (user) => {
                  if (user) {
                    setFb({ db, user, increment, doc, setDoc, updateDoc, onSnapshot, collection });
                    
                    if (user.email && ALLOWED_ADMIN_EMAILS.includes(user.email)) {
                       setIsAdmin(true);
                    } else {
                       setIsAdmin(false);
                    }
                  } else {
                     setIsAdmin(false);
                  }
                });
            }).catch(err => {
                console.warn('Auth Error: 訪客連線被 Firebase 拒絕，請確認是否已在 Firebase 開啟「匿名登入」功能。', err.message);
                setLoadingStats(false);
            });

          } catch (err) {
            console.error('Firebase Init Error:', err);
            setLoadingStats(false);
          }
        };

        if (window.FirebaseModules) {
          initFb();
        } else {
          window.addEventListener('firebase-modules-loaded', initFb);
        }

        return () => { 
          if(unsubscribeAuth) unsubscribeAuth(); 
          window.removeEventListener('firebase-modules-loaded', initFb);
        };
      }, []);

      // 💡 雲端內容即時同步 (加上 try catch 防止訪客被阻擋時跳錯)
      useEffect(() => {
        if (!fb || !fb.user) return;
        const contentDocRef = fb.doc(fb.db, 'artifacts', APP_DOC_ID, 'public', 'data', 'siteContent', 'main');

        const unsubscribe = fb.onSnapshot(contentDocRef, (snap) => {
           if (snap.exists()) {
              const data = snap.data();
              if (data.newsData) { setNewsData(data.newsData); localStorage.setItem('nuannuan_news_db', JSON.stringify(data.newsData)); }
              if (data.photoData) { setPhotoData(data.photoData); localStorage.setItem('nuannuan_photos_db', JSON.stringify(data.photoData)); }
              if (data.serviceAreas) { setServiceAreas(data.serviceAreas); localStorage.setItem('nuannuan_areas_db', JSON.stringify(data.serviceAreas)); }
              if (data.faqData) { setFaqData(data.faqData); localStorage.setItem('nuannuan_faq_db', JSON.stringify(data.faqData)); }
           } else {
              // 只有在系統確認您是管理員時，才會把本機資料初始化寫入雲端，以防訪客試圖寫入被阻擋而噴錯
              if (fb.user.email && ALLOWED_ADMIN_EMAILS.includes(fb.user.email)) {
                 fb.setDoc(contentDocRef, {
                    newsData: JSON.parse(localStorage.getItem('nuannuan_news_db')) || initialNewsList,
                    photoData: JSON.parse(localStorage.getItem('nuannuan_photos_db')) || initialPhotoList,
                    serviceAreas: JSON.parse(localStorage.getItem('nuannuan_areas_db')) || initialServiceAreas,
                    faqData: JSON.parse(localStorage.getItem('nuannuan_faq_db')) || initialFaqData
                 }).catch(err => console.warn("無法初始化雲端內容 (資料庫規則未開放)：", err.message));
              }
           }
        }, (err) => {
           console.warn("無法即時連線雲端內容 (規則可能未開放讀取)，將自動切換為本地端運作：", err.message);
        });

        return () => unsubscribe();
      }, [fb]);

      // 💡 Firebase 追蹤器與即時數據拉取 (加上 try catch 確保被拒絕時安靜處理)
      useEffect(() => {
        if (fb) {
          trackEventRef.current = (eventName) => {
            const docId = `${new Date().getFullYear()}_${new Date().getMonth() + 1}`;
            const docRef = fb.doc(fb.db, 'artifacts', APP_DOC_ID, 'public', 'data', 'stats', docId);
            
            fb.updateDoc(docRef, { [eventName]: fb.increment(1) }).catch(e => {
               if (e.code === 'not-found') {
                  fb.setDoc(docRef, { pageViews: 0, calcUses: 0, lineClicks: 0, [eventName]: 1 }, { merge: true })
                    .catch(err => console.warn("無法建立流量統計 (資料庫規則未開放)：", err.message));
               } else {
                  console.warn("流量統計更新被拒 (資料庫規則未開放)：", e.message);
               }
            });
          };
          
          const docId = `${new Date().getFullYear()}_${new Date().getMonth() + 1}`;
          const statsDocRef = fb.doc(fb.db, 'artifacts', APP_DOC_ID, 'public', 'data', 'stats', docId);
          
          let unsubStats = () => {};
          
          // 僅允許管理員去拉取即時流量顯示，一般訪客不需要此連線
          if (fb.user && fb.user.email && ALLOWED_ADMIN_EMAILS.includes(fb.user.email)) {
             unsubStats = fb.onSnapshot(statsDocRef, (snap) => {
                if (snap.exists()) setStats(snap.data());
                setLoadingStats(false);
             }, (err) => {
                console.warn("無法讀取流量統計：", err.message);
                setLoadingStats(false);
             });
          } else {
             setLoadingStats(false);
          }

          if (!window.__trackedPv) {
            window.__trackedPv = true;
            setTimeout(() => { if (trackEventRef.current) trackEventRef.current('pageViews'); }, 1000);
          }

          return () => unsubStats();
        }
      }, [fb]);

      const syncToCloud = (key, data) => {
        if (!fb || !fb.user) return;
        const contentDocRef = fb.doc(fb.db, 'artifacts', APP_DOC_ID, 'public', 'data', 'siteContent', 'main');
        fb.setDoc(contentDocRef, { [key]: data }, { merge: true }).catch(err => console.warn(`更新資料庫時被拒 (${key})：`, err.message));
      };

      const updateNewsData = (newData) => { 
          setNewsData(newData); 
          localStorage.setItem('nuannuan_news_db', JSON.stringify(newData));
          syncToCloud('newsData', newData); 
      };
      const updatePhotoData = (newData) => { 
          setPhotoData(newData); 
          localStorage.setItem('nuannuan_photos_db', JSON.stringify(newData));
          syncToCloud('photoData', newData); 
      };
      const updateServiceAreas = (newData) => { 
          setServiceAreas(newData); 
          localStorage.setItem('nuannuan_areas_db', JSON.stringify(newData));
          syncToCloud('serviceAreas', newData); 
      };
      const updateFaqData = (newData) => { 
          setFaqData(newData); 
          localStorage.setItem('nuannuan_faq_db', JSON.stringify(newData));
          syncToCloud('faqData', newData); 
      };

      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      const [showTopBtn, setShowTopBtn] = useState(false);
      
      const [level, setLevel] = useState('2');
      const [identity, setIdentity] = useState('16');
      const [quantities, setQuantities] = useState({});

      const handleLineClick = () => {
         if (trackEventRef.current) trackEventRef.current('lineClicks');
      };

      const handleCalcInteract = () => {
         if (!calcTracked && trackEventRef.current) {
            trackEventRef.current('calcUses');
            setCalcTracked(true);
         }
      };

      useEffect(() => {
        if (typeof window.gtag === 'function') {
          window.gtag('event', 'page_view', { page_title: `暖暖居家長照 - ${currentPage}`, page_path: `/${currentPage}` });
        }
      }, [currentPage]);

      const syncDrivePhotos = (isManual = false) => {
        setIsPhotoLoading(true);
        if (!GAS_PHOTO_API_URL || GAS_PHOTO_API_URL.includes("在此處貼上")) {
            if(isManual) alert('請先於程式碼設定 GAS_PHOTO_API_URL');
            setIsPhotoLoading(false);
            return;
        }
        
        fetch(GAS_PHOTO_API_URL)
            .then(response => response.json())
            .then(driveData => {
                if (driveData && driveData.length > 0) {
                    setPhotoData(prev => {
                        const newData = [...prev];
                        let changed = false;
                        let newCount = 0;
                        
                        driveData.forEach(driveItem => {
                            let imgUrl = driveItem.url;
                            if (imgUrl && imgUrl.includes('drive.google.com')) {
                                const match = imgUrl.match(/[\/?&]id=([a-zA-Z0-9_-]+)/) || imgUrl.match(/file\/d\/([a-zA-Z0-9_-]+)/);
                                if (match) imgUrl = `https://lh3.googleusercontent.com/d/${match[1]}`;
                            }

                            if (!newData.find(p => p.url === imgUrl)) {
                                newData.unshift({
                                    id: Date.now() + Math.random(),
                                    title: driveItem.title || driveItem.name || '雲端新照片',
                                    url: imgUrl,
                                    category: PHOTO_CATEGORIES[0], 
                                    description: '',
                                    isPublished: false 
                                });
                                changed = true;
                                newCount++;
                            }
                        });
                        
                        if (changed) {
                            updatePhotoData(newData);
                            if(isManual) alert(`✅ 同步完成！共新增 ${newCount} 張照片至後台資料庫。\n\n請在下方列表中編輯分類與描述，確認無誤後再點擊「發佈至前台」。`);
                            return newData;
                        } else {
                            if(isManual) alert('✅ 雲端資料夾目前沒有發現新的照片。');
                            return prev;
                        }
                    });
                } else {
                    if(isManual) alert('雲端資料夾目前為空。');
                }
            })
            .catch(error => {
                console.error('取得照片失敗:', error);
                if(isManual) alert('❌ 同步失敗，請檢查網路或 API 網址設定。');
            })
            .finally(() => {
                setIsPhotoLoading(false);
            });
      };

      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 20);
          setShowTopBtn(window.scrollY > 300);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const calcResults = useMemo(() => {
        const data = levelData[level];
        const subsidyLimit = data.subsidy;
        const rate = parseInt(identity) / 100;
        let currentTotalCost = 0;
        let totalCopay = 0;
        Object.keys(quantities).forEach(code => {
          const item = allServiceItems.find(i => i.code === code);
          const qty = parseInt(quantities[code]) || 0;
          for (let i = 0; i < qty; i++) {
            if (currentTotalCost + item.price <= subsidyLimit) {
              totalCopay += Math.round(item.price * (identity === '0' ? 0 : rate)); 
            } else {
              const remainingSubsidy = Math.max(0, subsidyLimit - currentTotalCost);
              totalCopay += (Math.round(remainingSubsidy * (identity === '0' ? 0 : rate)) + (item.price - remainingSubsidy));
            }
            currentTotalCost += item.price;
          }
        });
        return { totalCopay, currentTotalCost, subsidyLimit };
      }, [level, identity, quantities]);

      const handleQtyChange = (code, val) => {
        const newQty = val === "" ? 0 : Math.max(0, parseInt(val) || 0);
        setQuantities(prev => ({ ...prev, [code]: newQty }));
      };

      const togglePublishPhoto = (id) => {
        const newData = photoData.map(p => p.id === id ? { ...p, isPublished: !p.isPublished } : p);
        updatePhotoData(newData);
      };

      // 💡 優化導航置頂時間差，確保所有頁面切換都會平滑置頂
      const navigate = (page) => {
        setCurrentPage(page);
        setIsMenuOpen(false);
        setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 50);
      };

      const navigateToAlbum = (category) => {
        setSelectedAlbum(category);
        setCurrentPage('album');
        setIsMenuOpen(false);
        setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 50);
      };

      const handleAdminLogin = () => {
        if(isAdmin) {
          navigate('admin');
          return;
        }
        setShowLoginModal(true);
        setLoginError('');
      };

      // 💡 Google 登入處理邏輯
      const handleGoogleLogin = () => {
        if (!fbAuthInstance || !window.FirebaseModules) {
           setLoginError("系統尚未連線完畢，請稍後再試。");
           return;
        }
        
        setLoginError("");
        const provider = new window.FirebaseModules.GoogleAuthProvider();
        
        window.FirebaseModules.signInWithPopup(fbAuthInstance, provider)
          .then((result) => {
            const user = result.user;
            if (ALLOWED_ADMIN_EMAILS.includes(user.email)) {
               setIsAdmin(true);
               setShowLoginModal(false);
               navigate('admin');
            } else {
               setLoginError(`帳號 ${user.email} 無後台訪問權限。`);
               // 無權限者自動登出其 Google 帳號，並退回匿名身份維持數據追蹤
               window.FirebaseModules.signOut(fbAuthInstance)
                 .then(() => window.FirebaseModules.signInAnonymously(fbAuthInstance))
                 .catch(e => console.warn(e));
            }
          }).catch((error) => {
            console.error("Google Login Error:", error);
            if (error.code === 'auth/unauthorized-domain') {
               setLoginError("【網域未授權】請至 Firebase Authentication 的「設定 > 授權網域」加入您目前的網址。");
            } else if (error.code === 'auth/popup-blocked' || error.code === 'auth/popup-closed-by-user') {
               setLoginError("【視窗被阻擋或關閉】請確認瀏覽器未阻擋彈出視窗，並請重試。");
            } else {
               setLoginError(`登入失敗：${error.message}`);
            }
          });
      };

      // 💡 安全登出邏輯
      const handleSafeLogout = () => {
         if (fbAuthInstance && window.FirebaseModules) {
            window.FirebaseModules.signOut(fbAuthInstance).then(() => {
               window.FirebaseModules.signInAnonymously(fbAuthInstance).catch(e => console.warn(e));
            }).catch(e => console.warn(e));
         }
         setIsAdmin(false);
         navigate('home');
      };

      return (
        <div className="min-h-screen flex flex-col overflow-x-hidden">
          <nav className={`fixed w-full z-[100] transition-all duration-500 ${scrolled ? 'bg-white shadow-md py-3' : 'bg-transparent py-8'}`}>
            <div className="max-w-[1500px] mx-auto px-6 md:px-8 flex justify-between items-center">
              
              {/* 💡 讓標題在手機版正常顯示，並設定最大寬度防跑版 */}
              <div className="flex items-center gap-2 md:gap-4 cursor-pointer group shrink-0" onClick={() => navigate('home')}>
                <div className="bg-orange-500 p-2 md:p-2.5 rounded-2xl text-white shadow-2xl animate-sun group-hover:rotate-12 transition duration-300 shrink-0">
                  <Sun size={28} className="md:w-8 md:h-8" />
                </div>
                <div className="flex flex-col text-left leading-tight max-w-[220px] sm:max-w-none">
                  <span className="font-black text-[10px] sm:text-xs md:text-sm tracking-tighter text-gray-900 leading-tight truncate sm:text-clip">{fullBrandName}</span>
                  <span className="text-[8px] sm:text-[9px] md:text-[10px] font-black text-orange-500 tracking-widest uppercase mt-0.5">府授衛長字第1150109649號</span>
                </div>
              </div>
              
              <div className={`hidden lg:flex gap-6 xl:gap-10 items-center font-black text-sm uppercase tracking-widest shrink-0`}>
                <button onClick={() => navigate('home')} className={`hover:text-orange-500 ${['home', 'album'].includes(currentPage)?'text-orange-500 underline underline-offset-[16px] decoration-4':''}`}>首頁故事</button>
                <button onClick={() => navigate('info')} className={`hover:text-orange-500 ${currentPage==='info'?'text-orange-500 underline underline-offset-[16px] decoration-4':''}`}>服務與對象</button>
                <button onClick={() => navigate('calc')} className={`hover:text-orange-500 ${currentPage==='calc'?'text-orange-500 underline underline-offset-[16px] decoration-4':''}`}>費用試算</button>
                <button onClick={() => navigate('faq')} className={`hover:text-orange-500 ${currentPage==='faq'?'text-orange-500 underline underline-offset-[16px] decoration-4':''}`}>常見問答</button>
                <button onClick={() => navigate('social')} className={`hover:text-orange-500 ${currentPage==='social'?'text-orange-500 underline underline-offset-[16px] decoration-4':''}`}>社群專區</button>
                
                {isAdmin ? (
                  <button onClick={() => navigate('admin')} className={`text-orange-600 bg-orange-50 px-5 py-2 rounded-full border-2 border-orange-200 hover:bg-orange-100 transition-colors flex items-center gap-2`}>
                    <Lock size={16}/> 管理中心
                  </button>
                ) : (
                  <button onClick={() => navigate('recruit')} className={`hover:text-orange-500 ${currentPage==='recruit'?'text-orange-500 underline underline-offset-[16px] decoration-4':''}`}>人才招募</button>
                )}

                <a href="tel:0901071711" className="bg-orange-500 text-white px-6 py-3.5 rounded-full text-xs shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-2 shadow-orange-500/20"><Phone size={14}/> 聯繫督導</a>
              </div>
              <button className="lg:hidden text-gray-800 p-2" onClick={() => setIsMenuOpen(!isMenuOpen)}><Menu size={36} /></button>
            </div>
            
            {/* 行動版選單 */}
            {isMenuOpen && (
              <div className="lg:hidden fixed inset-0 top-0 bg-white z-[200] p-10 md:p-12 flex flex-col gap-6 text-xl font-black text-gray-800 animate-page overflow-y-auto">
                <div className="flex justify-end mb-4"><button onClick={()=>setIsMenuOpen(false)}><X size={40} className="text-stone-300"/></button></div>
                <button onClick={() => navigate('home')} className="text-left border-b-4 border-stone-50 pb-4 flex justify-between items-center">首頁故事 <ChevronRight size={24}/></button>
                <button onClick={() => navigate('info')} className="text-left border-b-4 border-stone-50 pb-4 flex justify-between items-center">服務與對象 <ChevronRight size={24}/></button>
                <button onClick={() => navigate('calc')} className="text-left border-b-4 border-stone-50 pb-4 flex justify-between items-center">費用試算 <ChevronRight size={24}/></button>
                <button onClick={() => navigate('faq')} className="text-left border-b-4 border-stone-50 pb-4 flex justify-between items-center">常見問答 (FAQ) <ChevronRight size={24}/></button>
                <button onClick={() => navigate('social')} className="text-left border-b-4 border-stone-50 pb-4 flex justify-between items-center">社群專區 <ChevronRight size={24}/></button>
                {isAdmin ? (
                  <button onClick={() => navigate('admin')} className="text-left border-b-4 border-stone-50 pb-4 flex justify-between items-center text-orange-500">系統管理中心 <ChevronRight size={24}/></button>
                ) : (
                  <button onClick={() => navigate('recruit')} className="text-left border-b-4 border-stone-50 pb-4 flex justify-between items-center">人才招募 <ChevronRight size={24}/></button>
                )}
              </div>
            )}
          </nav>

          <main className="flex-grow">
            {currentPage === 'home' && <HomePage onNavigate={navigate} onNavigateAlbum={navigateToAlbum} newsData={newsData} photoData={photoData} serviceAreas={serviceAreas} />}
            {currentPage === 'album' && <AlbumPage category={selectedAlbum} photoData={photoData} onBack={() => navigate('home')} />}
            {currentPage === 'info' && <InfoPage />}
            {currentPage === 'faq' && <FaqPage faqData={faqData} />}
            {currentPage === 'calc' && <CalcPage level={level} setLevel={setLevel} identity={identity} setIdentity={setIdentity} quantities={quantities} handleQtyChange={handleQtyChange} calcResults={calcResults} onInteract={handleCalcInteract} />}
            {currentPage === 'social' && <SocialPage onLineClick={handleLineClick} />}
            {currentPage === 'recruit' && <RecruitPage onLineClick={handleLineClick} />}

            {currentPage === 'admin' && isAdmin && (
              <AdminPage 
                fb={fb}
                stats={stats}
                loadingStats={loadingStats}
                newsData={newsData} 
                setNewsData={updateNewsData} 
                photoData={photoData} 
                setPhotoData={updatePhotoData}
                serviceAreas={serviceAreas}
                setServiceAreas={updateServiceAreas}
                faqData={faqData}
                setFaqData={updateFaqData}
                isPhotoLoading={isPhotoLoading}
                syncDrivePhotos={syncDrivePhotos}
                togglePublishPhoto={togglePublishPhoto}
                onLogout={handleSafeLogout} 
              />
            )}
            
            {currentPage === 'privacy' && <PolicyPage 
              title="隱私權保護政策" 
              icon={<Lock size={36} />}
