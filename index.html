    const Users = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const ClipboardCheck = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></svg>;
    const MessageCircle = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
    const HelpCircle = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
    const ArrowDown = ({size=24, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>;


    const OfficialWebsite = () => {
      const [currentPage, setCurrentPage] = useState('home');
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      const [activeFAQ, setActiveFAQ] = useState(null);

      // 試算器狀態
      const [level, setLevel] = useState('2');
      const [identity, setIdentity] = useState('16');
      const [quantities, setQuantities] = useState({});

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // --- 資料定義 ---
      const levelData = {
        '2': { subsidy: 10020, co16: 1603, co5: 501, respite: '32,340', short: '87,780' },
        '3': { subsidy: 15460, co16: 2474, co5: 773, respite: '32,340', short: '87,780' },
        '4': { subsidy: 18580, co16: 2973, co5: 929, respite: '32,340', short: '87,780' },
        '5': { subsidy: 24100, co16: 3856, co5: 1205, respite: '32,340', short: '87,780' },
        '6': { subsidy: 28070, co16: 4491, co5: 1404, respite: '32,340', short: '87,780' },
        '7': { subsidy: 32090, co16: 5134, co5: 1605, respite: '48,510', short: '71,610' },
        '8': { subsidy: 36180, co16: 5789, co5: 1809, respite: '48,510', short: '71,610' },
      };

      const serviceItems = [
        { code: 'BA01', name: '基本身體清潔', price: 260 },
        { code: 'BA02', name: '基本日常照顧(30分)', price: 195 },
        { code: 'BA04', name: '協助餵食或灌食', price: 130 },
        { code: 'BA05', name: '餐食照顧', price: 310 },
        { code: 'BA07', name: '協助沐浴及洗頭', price: 325 },
        { code: 'BA14', name: '陪同就醫(1.5hr)', price: 685 },
        { code: 'BA15', name: '家務協助(30分)', price: 195 },
        { code: 'GA09', name: '居家喘息(2hr)', price: 770 },
        { code: 'SC09', name: '短照服務(2hr)', price: 770 },
      ];

      const faqs = [
        { q: "要怎麼開始申請居家服務？", a: "您可以先撥打長照專線 1966，由照管中心評估失能等級後，指定由「暖暖居家」為您服務；或直接聯繫我們，我們將協助您完成後續流程。" },
        { q: "居服員可以幫忙全家大掃除嗎？", a: "居家服務主要以「長輩本人的生活起居」為主（如：長輩的房間、長輩的衣物）。為了保障照服員的專業與您的權益，無法提供全家大掃除等非關長輩本人的勞務服務喔！" },
        { q: "費用要怎麼計算？", a: "費用依據政府核定的失能等級（CMS）與您的福利身份（一般戶、中低收）而定。您可以使用我們網站上的「費用試算」工具，快速預估每月的自負額。" },
      ];

      // --- 邏輯函數 ---
      const navigate = (page) => {
        setCurrentPage(page);
        setIsMenuOpen(false);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const calculateCoPay = (price) => {
        if (identity === '0') return 0;
        return Math.round(price * (parseInt(identity) / 100));
      };

      const getFullCalculation = () => {
        const data = levelData[level];
        const subsidyLimit = data.subsidy;
        const rate = parseInt(identity) / 100;
        let currentTotalCost = 0;
        let totalCopay = 0;
        let totalItems = 0;

        Object.keys(quantities).forEach(code => {
          const item = serviceItems.find(i => i.code === code);
          const qty = quantities[code];
          totalItems += qty;
          for (let i = 0; i < qty; i++) {
            if (currentTotalCost + item.price <= subsidyLimit) {
              totalCopay += Math.round(item.price * rate);
            } else {
              const remainingSubsidy = Math.max(0, subsidyLimit - currentTotalCost);
              const copayForRemaining = Math.round(remainingSubsidy * rate);
              totalCopay += (copayForRemaining + (item.price - remainingSubsidy));
            }
            currentTotalCost += item.price;
          }
        });
        return { totalCopay, currentTotalCost, subsidyLimit, totalItems };
      };

      const calcResults = getFullCalculation();

      // --- 子組件 ---
      const Navbar = () => (
        <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/95 backdrop-blur-md shadow-md py-3' : 'bg-transparent py-6'}`}>

            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => navigate('home')}>

              </div>
              <div className="flex flex-col">

                <span className={`text-[8px] font-bold ${scrolled ? 'text-orange-500' : 'text-white/80 md:text-orange-500'}`}>府授衛長字第1150109649號</span>
              </div>
            </div>

            <div className={`hidden md:flex gap-8 items-center font-bold text-sm ${scrolled ? 'text-gray-600' : 'text-white md:text-gray-600'}`}>

              <button onClick={() => navigate('about')} className="hover:text-orange-500 transition">關於暖暖</button>
              <button onClick={() => navigate('services')} className="hover:text-orange-500 transition">服務與常見問題</button>
              <button onClick={() => navigate('calc')} className="hover:text-orange-500 transition">費用試算</button>
              <a href="tel:0901071711" className="bg-orange-500 text-white px-6 py-2.5 rounded-full hover:bg-orange-600 transition shadow-lg flex items-center gap-2">
                <Phone size={16}/> 聯繫督導
              </a>
            </div>

            <button className={`md:hidden ${scrolled ? 'text-gray-900' : 'text-white'}`} onClick={() => setIsMenuOpen(!isMenuOpen)}>
              {isMenuOpen ? <X size={28} /> : <Menu size={28} />}

          {isMenuOpen && (

              <button onClick={() => navigate('calc')} className="text-left border-b pb-4 border-gray-100">費用試算</button>

            </div>

      );

      const Footer = () => (
        <footer className="bg-stone-900 text-white py-20 px-6">

            <div className="col-span-2">

                立案字號：府授衛長字第1150109649號
              </div>
            </div>
            <div>
              <h4 className="font-bold mb-6 text-orange-500">快速連結</h4>
              <ul className="space-y-4 text-stone-400 text-sm font-medium">
                <li className="cursor-pointer hover:text-white transition" onClick={() => navigate('about')}>品牌理念與團隊</li>

              <ul className="space-y-4 text-stone-400 text-sm font-medium">
                <li className="flex items-center gap-3"><Phone size={16} className="text-orange-500"/> 0901-071-711</li>
                <li className="flex items-center gap-3"><MessageCircle size={16} className="text-green-500"/> Line: @nuannuan</li>
                <li className="flex items-start gap-3"><MapPin size={16} className="text-orange-500 shrink-0 mt-1"/> 彰化市</li>

          <div className="max-w-7xl mx-auto mt-20 pt-10 border-t border-white/5 text-[10px] text-stone-600 flex flex-col md:flex-row justify-between items-center gap-4 uppercase tracking-widest font-bold">
            <span>© 2026 Nuan Nuan Home Care. All Rights Reserved.</span>
            <span>Made with Heart in Changhua</span>

        </footer>
      );

      // --- 各分頁內容 ---
      const HomePage = () => (
        <div className="animate-in fade-in duration-700">
          <section className="relative h-[90vh] flex items-center px-6 overflow-hidden bg-gray-900">
            <div className="absolute inset-0 bg-gradient-to-r from-black/80 via-black/50 to-transparent z-10"></div>
            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1576765608535-5f04d1e3f289?auto=format&fit=crop&q=80')] bg-cover bg-center"></div>
            <div className="max-w-7xl mx-auto w-full relative z-20">

                  Professional Home Care

                <h1 className="text-5xl md:text-7xl font-black text-white mb-8 leading-[1.1]">暖暖照護，<br/><span className="text-orange-500">讓愛延續</span></h1>

                </p>
                <div className="flex flex-wrap gap-4">
                  <button onClick={() => navigate('calc')} className="bg-orange-500 text-white px-8 py-4 rounded-full font-black text-sm hover:bg-orange-600 transition shadow-2xl shadow-orange-500/20 flex items-center gap-2">
                    <Calculator size={18}/> 立即費用試算
                  </button>
                  <a href="tel:0901071711" className="bg-white text-gray-900 px-8 py-4 rounded-full font-black text-sm hover:bg-gray-100 transition flex items-center gap-2">
                    <Phone size={18}/> 免費諮詢督導

                </div>

            <div className="absolute bottom-10 left-1/2 -translate-x-1/2 z-20 text-white/50 animate-bounce">
               <ArrowDown size={24} />
            </div>
          </section>

          <section className="py-24 px-6 bg-white">
            <div className="max-w-7xl mx-auto">
               <div className="text-center mb-16">
                  <h2 className="text-3xl font-black mb-4">為什麼選擇暖暖居家？</h2>
                  <div className="w-16 h-1 bg-orange-500 mx-auto rounded-full"></div>
               </div>
               
               <div className="grid md:grid-cols-3 gap-12">
                 <div className="flex flex-col items-center text-center p-8 rounded-[32px] bg-stone-50 hover:bg-white hover:shadow-xl transition-all border border-transparent hover:border-stone-100">
                   <div className="bg-orange-100 w-16 h-16 rounded-2xl flex items-center justify-center text-orange-600 mb-6"><Award size={28}/></div>
                   <h3 className="text-xl font-black mb-3">專業社工督導</h3>
                   <p className="text-stone-500 text-sm leading-relaxed">由具備國家考試合格證書的社工師親自帶領團隊，溝通無礙，更能精準評估長輩深層需求。</p>
                 </div>
                 <div className="flex flex-col items-center text-center p-8 rounded-[32px] bg-stone-50 hover:bg-white hover:shadow-xl transition-all border border-transparent hover:border-stone-100">
                   <div className="bg-orange-100 w-16 h-16 rounded-2xl flex items-center justify-center text-orange-600 mb-6"><Heart size={28}/></div>
                   <h3 className="text-xl font-black mb-3">嚴選照護團隊</h3>
                   <p className="text-stone-500 text-sm leading-relaxed">每一位居服員皆具備長照人員小卡並受過完整訓練，提供有溫度、有尊嚴的貼身照顧。</p>
                 </div>

                   <h3 className="text-xl font-black mb-3">收費公開透明</h3>

                 </div>
               </div>
            </div>
          </section>
        </div>
      );

      const AboutPage = () => (
        <div className="pt-32 pb-24 px-6 animate-in slide-in-from-bottom-10 duration-700 bg-white">
          <div className="max-w-7xl mx-auto">
